name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # 1-bosqich: Build va tekshirish
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat > .env.production << EOF
          VITE_APP_TITLE=English Learning App
          VITE_API_BASE_URL=https://bot.jamacoder.uz/api
          VITE_TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          VITE_DEFAULT_LANGUAGE=uz
          VITE_DEFAULT_THEME=dark
          EOF

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # 2-bosqich: Serverga deploy
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/English-app-client-view"
          strip_components: 0

  # 3-bosqich: Telegram notification
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Prepare commit message
        id: commit
        run: |
          MSG=$(echo "${{ github.event.head_commit.message }}" | head -1 | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Notify Telegram (Success)
        if: ${{ needs.build.result == 'success' && needs.deploy.result == 'success' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="✅ <b>Deploy muvaffaqiyatli!</b>%0A%0A📦 <b>Repo:</b> ${{ github.repository }}%0A🔀 <b>Branch:</b> ${{ github.ref_name }}%0A👤 <b>Author:</b> ${{ github.actor }}%0A💬 <b>Commit:</b> ${{ steps.commit.outputs.msg }}%0A%0A🌐 <a href='https://bot.jamacoder.uz'>bot.jamacoder.uz</a>"

      - name: Notify Telegram (Build Failed)
        if: ${{ needs.build.result == 'failure' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>Build xato!</b>%0A%0A📦 <b>Repo:</b> ${{ github.repository }}%0A👤 <b>Author:</b> ${{ github.actor }}%0A💬 <b>Commit:</b> ${{ steps.commit.outputs.msg }}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Loglarni ko'rish</a>"

      - name: Notify Telegram (Deploy Failed)
        if: ${{ needs.build.result == 'success' && needs.deploy.result == 'failure' }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>Deploy xato!</b> (Build ok, server xato)%0A%0A📦 <b>Repo:</b> ${{ github.repository }}%0A👤 <b>Author:</b> ${{ github.actor }}%0A💬 <b>Commit:</b> ${{ steps.commit.outputs.msg }}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Loglarni ko'rish</a>"
