name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production
        run: |
          cat > .env.production << EOF
          VITE_APP_TITLE=English Learning App
          VITE_API_BASE_URL=https://jamacoder.uz/api
          VITE_TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          VITE_DEFAULT_LANGUAGE=uz
          VITE_DEFAULT_THEME=light
          EOF

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist/*"
          target: "/var/www/English-app-client-view"
          strip_components: 0

      - name: Notify Telegram (Success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="✅ <b>Deploy muvaffaqiyatli!</b>%0A%0A📦 <b>Repo:</b> ${{ github.repository }}%0A🔀 <b>Branch:</b> ${{ github.ref_name }}%0A👤 <b>Author:</b> ${{ github.actor }}%0A💬 <b>Commit:</b> ${{ github.event.head_commit.message }}%0A%0A🌐 <a href='https://jamacoder.uz'>jamacoder.uz</a>"

      - name: Notify Telegram (Failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d parse_mode=HTML \
            -d text="❌ <b>Deploy xato!</b>%0A%0A📦 <b>Repo:</b> ${{ github.repository }}%0A🔀 <b>Branch:</b> ${{ github.ref_name }}%0A👤 <b>Author:</b> ${{ github.actor }}%0A💬 <b>Commit:</b> ${{ github.event.head_commit.message }}%0A%0A🔗 <a href='https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'>Loglarni ko'rish</a>"
